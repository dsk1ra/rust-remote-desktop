name: Flutter Windows CI

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'rust/**'
      - '.github/workflows/flutter-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'rust/**'
      - '.github/workflows/flutter-windows.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    if: ${{ github.actor != 'nektos/act' }}
    name: Flutter Quality Checks
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long file paths (Windows)
        run: git config --system core.longpaths true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: x64

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Dart pub cache
        uses: actions/cache@v4
        with:
          path: "${{ env.LOCALAPPDATA }}\\Pub\\Cache"
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Enable Windows desktop
        run: flutter config --no-analytics --enable-windows-desktop

      - name: Pre-cache Windows artifacts
        run: flutter precache --windows

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.11.1 --locked

      - name: Add Cargo bin to PATH
        run: |
          "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure rust_builder exists
        working-directory: client
        run: |
          if (-not (Test-Path "rust_builder/pubspec.yaml")) {
            flutter_rust_bridge_codegen integrate --template app
          }

      - name: Generate rust_builder (Cargokit)
        working-directory: client
        run: flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: Fetch Dart/Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Enforce Dart formatting
        working-directory: client
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter project
        working-directory: client
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: client
        run: flutter test

  flutter-quality-act:
    if: ${{ github.actor == 'nektos/act' }}
    name: Flutter Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: x64

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Dart pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.11.1 --locked

      - name: Add Cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Ensure rust_builder exists
        working-directory: client
        run: |
          if [ ! -f rust_builder/pubspec.yaml ]; then
            flutter_rust_bridge_codegen integrate --template app
          fi

      - name: Generate rust_builder (Cargokit)
        working-directory: client
        run: flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: Fetch Dart/Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Enforce Dart formatting
        working-directory: client
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter project
        working-directory: client
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: client
        run: flutter test

  build-windows-release:
    if: ${{ github.actor != 'nektos/act' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
    name: Build Windows Release
    runs-on: windows-latest
    needs: flutter-quality
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long file paths (Windows)
        run: git config --system core.longpaths true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          architecture: x64

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Dart pub cache
        uses: actions/cache@v4
        with:
          path: "${{ env.LOCALAPPDATA }}\\Pub\\Cache"
          key: ${{ runner.os }}-pub-${{ hashFiles('client/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Enable Windows desktop
        run: flutter config --no-analytics --enable-windows-desktop

      - name: Pre-cache Windows artifacts
        run: flutter precache --windows

      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.11.1 --locked

      - name: Add Cargo bin to PATH
        run: |
          "${env:USERPROFILE}\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure rust_builder exists
        working-directory: client
        run: |
          if (-not (Test-Path "rust_builder/pubspec.yaml")) {
            flutter_rust_bridge_codegen integrate --template app
          }

      - name: Generate rust_builder (Cargokit)
        working-directory: client
        run: flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml

      - name: Fetch Dart/Flutter dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Windows app (Release)
        working-directory: client
        env:
          RUST_BACKTRACE: 1
        run: flutter build windows --release

      - name: Archive Windows build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: client/build/windows/x64/runner/Release/
          if-no-files-found: warn