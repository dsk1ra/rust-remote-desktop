name: Build and Release Windows Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Flutter
        uses: actions/cache@v3
        with:
          path: ~/.flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('client/flutter/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get Flutter dependencies
        working-directory: client/flutter
        run: flutter pub get

      - name: Generate Rust bindings
        working-directory: client/flutter
        run: flutter_rust_bridge_codegen

      - name: Build Flutter Windows release
        working-directory: client/flutter
        run: flutter build windows --release

      - name: Setup Inno Setup
        run: choco install innosetup -y

      - name: Extract version from tag
        id: version
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Build installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss `
            /DAppVersion="${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            YourProjectSetup.exe
          body: |
            ## Windows Client Release v${{ steps.version.outputs.version }}
            
            Download `YourProjectSetup.exe` to install on your Windows machine.
            
            **System requirements:**
            - Windows 10 or later
            - 100 MB free disk space
